name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test --no-file-parallelism
      - name: Web package tests
        run: pnpm test:web

      # Smoke test: pack and verify CLI works
      - name: Smoke test
        run: |
          npm pack
          mkdir /tmp/smoke && cd /tmp/smoke
          npm init -y
          npm i $GITHUB_WORKSPACE/codeagora-*.tgz
          npx agora --version
          npx agora doctor || echo "::warning::doctor check failed (expected without API keys)"

      # Publish core package
      - name: Publish codeagora
        run: npm publish --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish optional packages
      - name: Publish optional packages
        run: |
          for pkg in web tui mcp notifications; do
            cd packages/$pkg && npm publish --access public || true && cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
