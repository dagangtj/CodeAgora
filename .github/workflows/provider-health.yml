name: Provider Health Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Ping Tier 1 providers
        id: health
        continue-on-error: true
        run: node packages/cli/dist/index.js doctor --live
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Create issue on failure
        if: steps.health.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Provider health check failed (${date})`,
              body: `Weekly provider health check detected failures.\n\nSee [workflow run](${runUrl}) for details.`,
              labels: ['bug', 'provider']
            });
